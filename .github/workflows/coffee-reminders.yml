name: Daily Coffee Reminders (manual fallback)

# Scheduled reminders now run via Supabase pg_cron
# (supabase/migrations/20260620000200_daily_reminders_cron.sql), which is far more
# reliable than GitHub Actions cron. This workflow is kept only as a MANUAL
# fallback to fire a one-off reminder broadcast if pg_cron is ever unavailable.
on:
  workflow_dispatch: # Manual trigger only

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          # Determine message based on time of day (UTC)
          HOUR=$(date +%H)

          if [ $HOUR -lt 5 ]; then
             # Morning (approx 02:00 UTC)
             TITLE="Morning Brew ☕"
             BODY="Rise and shine! Don't forget to log your morning coffee."
          elif [ $HOUR -lt 12 ]; then
             # Afternoon (approx 07:30 UTC)
             TITLE="Afternoon Pick-me-up? ☀️"
             BODY="Powering through the day? Log your afternoon fuel!"
          else
             # Evening (approx 13:00 UTC)
             TITLE="Evening Wind Down 🌙"
             BODY="Having a late one? Log your evening brew (or decaf!)."
          fi

          echo "Sending $TITLE..."

          curl -X POST "${SUPABASE_URL}/functions/v1/push-notify" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -d "{
              \"broadcast\": true,
              \"category\": \"reminder\",
              \"title\": \"$TITLE\",
              \"body\": \"$BODY\",
              \"url\": \"/home\",
              \"icon\": \"/logo.png\"
            }"
